name: Automatizacion Diario COES RER

on:
  schedule:
    # 22:00 UTC equivale a las 17:00 (5:00 PM) hora de Perú (GMT-5)
    - cron: '0 22 * * *'
  workflow_dispatch: # Permite ejecutar el script manualmente desde el botón de GitHub cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso crucial para que el bot pueda guardar el archivo actualizado

    steps:
    - name: Clonar repositorio actual
      uses: actions/checkout@v3

    - name: Configurar entorno de Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar librerías requeridas
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests

    - name: Ejecutar script extractor
      run: python script.py

    - name: Guardar y subir cambios al repositorio de GitHub
      run: |
        git config --global user.name "COES Bot"
        git config --global user.email "actions@github.com"
        git add historico_generacion_rer.csv
        # Solo hacer commit si el archivo realmente cambió para evitar errores
        git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización automática RER - $(date +'%Y-%m-%d')" && git push)
